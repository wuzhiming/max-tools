<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>Toolbar</title>
    <style>
      /*
       * The window is much larger than the visible pill (extra transparent
       * room so Mantine popovers/menus/tooltips never clip at the edge).
       * Override Mantine's body-bg variable so the chrome stays transparent.
       */
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background: transparent !important;
        background-color: transparent !important;
        --mantine-color-body: transparent;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #root {
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
